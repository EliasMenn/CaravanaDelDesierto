name: C CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:   

concurrency:
  group: c-ci
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - name: Arreglar Windows include paths
        run: |
          find . \( -name "*.c" -o -name "*.h" \) -print0 | \
          xargs -0 sed -i '/#include/s#\\#/#g'

      - name: Snapshot
        run: |
          cp -r . ../clean_snapshot

      - name: Compilar
        run: |
          gcc -Wall -Wextra -std=c11 \
          -Iheaders \
          -Imacros \
          main.c \
          sources/*.c \
          tests/*.c \
          tests/sources/*.c \
          -o program

      - name: Correr programa
        run: ./program test

      - name: Restaurar Snapshot
        run: |
          rm -rf .
          cp -r . ../clean_snapshot/*

      - name: Chequeo Memoria
        run: |
          valgrind --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            ./program test