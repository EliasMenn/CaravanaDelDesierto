name: C CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:   

concurrency:
  group: c-ci
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - name: Arreglar Windows include paths
        run: |
          find . \( -name "*.c" -o -name "*.h" \) -print0 | \
          xargs -0 sed -i '/#include/s#\\#/#g'

      - name: Snapshot
        run: |
          cp -r . ../clean_snapshot

      - name: Compilar
        run: |
          gcc -Wall -Wextra -std=c11 \
          -Iheaders \
          -Imacros \
          main.c \
          sources/*.c \
          tests/*.c \
          tests/sources/*.c \
          -o program

      - name: Correr programa
        run: ./program test

      - name: Limpiar
        run: git clean -fdx

      - name: ReCompilar
        run: |
          gcc -Wall -Wextra -std=c11 \
          -Iheaders \
          -Imacros \
          main.c \
          sources/*.c \
          tests/*.c \
          tests/sources/*.c \
          -o program

      - name: Chequeo Memoria
        run: |
          valgrind --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            ./program test

      - name: Discord notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=65280
            STATUS="SUCCESS"
            EMOJI="✅"
          else
            COLOR=16711680
            STATUS="FAILED"
            EMOJI="❌"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"CI Result\",
              \"description\": \"${EMOJI} Build ${STATUS} for ${{ github.repository }}\",
              \"color\": ${COLOR},
              \"fields\": [
                {
                  \"name\": \"Branch\",
                  \"value\": \"${{ github.ref_name }}\"
                },
                {
                  \"name\": \"Commit\",
                  \"value\": \"${{ github.sha }}\"
                }
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}